name: CI/CD Pipeline - Soluciones Tecnologicas del Futuro

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ==========================================
  # JOB 1: PRUEBAS AUTOMATIZADAS
  # ==========================================
  test:
    name: Pruebas Automatizadas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install flask pytest boto3 moto

      - name: Crear test basico
        run: |
          mkdir -p tests
          cat > tests/test_app.py << 'EOF'
          import sys
          sys.path.insert(0, 'docker')
          from app import app

          def test_home():
              client = app.test_client()
              response = client.get('/')
              assert response.status_code == 200
              data = response.get_json()
              assert data['status'] == 'running'
              assert data['empresa'] == 'Soluciones Tecnologicas del Futuro'

          def test_health():
              client = app.test_client()
              response = client.get('/health')
              assert response.status_code == 200
              data = response.get_json()
              assert data['status'] == 'healthy'
          EOF

      - name: Ejecutar pruebas
        run: |
          pytest tests/test_app.py -v

  # ==========================================
  # JOB 2: BUILD DOCKER
  # ==========================================
  build:
    name: Build imagen Docker
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Build imagen
        run: |
          cd docker
          docker build -t stf-app:latest .
          echo "✅ Imagen Docker construida correctamente"

      - name: Verificar imagen
        run: |
          docker images stf-app
          docker run --rm -d -p 5000:5000 --name test-container stf-app:latest
          sleep 3
          curl -f http://localhost:5000/health || exit 1
          docker stop test-container
          echo "✅ Contenedor verificado correctamente"

  # ==========================================
  # JOB 3: VALIDAR CLOUDFORMATION
  # ==========================================
  validate:
    name: Validar CloudFormation
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Instalar Python y dependencias
        run: pip install pyyaml

      - name: Validar YAML CloudFormation
        run: |
          python3 << 'EOF'
          import yaml

          def cfn_tag(loader, tag_suffix, node):
              if isinstance(node, yaml.ScalarNode):
                  return loader.construct_scalar(node)
              elif isinstance(node, yaml.SequenceNode):
                  return loader.construct_sequence(node)
              return loader.construct_mapping(node)

          for tag in ['!Sub','!Ref','!GetAtt','!If','!Select',
                      '!Split','!Join','!Base64','!FindInMap']:
              yaml.add_multi_constructor(tag, cfn_tag, Loader=yaml.SafeLoader)

          with open('cloudformation/infraestructura.yaml', 'r') as f:
              data = yaml.safe_load(f)

          print("✅ CloudFormation YAML válido")
          print(f"   Recursos: {list(data['Resources'].keys())}")
          EOF

  # ==========================================
  # JOB 4: DEPLOY (simulado)
  # ==========================================
  deploy:
    name: Deploy a Produccion
    needs: [build, validate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Simular deploy a AWS
        run: |
          echo "🚀 Iniciando deploy a producción..."
          echo "📦 Subiendo imagen a ECR..."
          echo "☁️  Actualizando infraestructura CloudFormation..."
          echo "🔄 Reiniciando servicios EC2..."
          echo "✅ Deploy completado exitosamente"

      - name: Verificar deploy
        run: |
          echo "🔍 Verificando estado del deploy..."
          echo "✅ Todos los servicios están operativos"
          echo "🌐 Aplicación disponible en producción"

  # ==========================================
  # JOB 5: ROLLBACK AUTOMATICO
  # ==========================================
  rollback:
    name: Rollback si hay fallos
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Ejecutar rollback
        run: |
          echo "⚠️  Se detectó un fallo en el deploy"
          echo "🔄 Iniciando rollback automático..."
          echo "⏪ Restaurando versión anterior..."
          echo "✅ Rollback completado"
